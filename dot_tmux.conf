set -g mouse on
# 开启终端真彩色支持
set -g default-terminal "screen-256color"
# 或更好的选择（如果终端支持）
set -g default-terminal "tmux-256color"

# 确保 tmux 传递颜色设置
set -ga terminal-overrides ",*256col*:Tc"

# 状态栏彩色
set -g status-style bg=black,fg=white

# 窗口状态颜色
setw -g window-status-style fg=cyan,bg=black
setw -g window-status-current-style fg=white,bg=blue,bold

# 边框颜色
set -g pane-border-style fg=green
set -g pane-active-border-style fg=brightgreen

# 消息提示颜色
set -g message-style fg=white,bg=black,bright

# ==================== 插件管理 ====================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'      # 基础优化

# 常用插件
set -g @plugin 'tmux-plugins/tmux-resurrect'     # 会话保存/恢复
set -g @plugin 'tmux-plugins/tmux-continuum'      # 自动保存
set -g @plugin 'tmux-plugins/tmux-yank'           # 系统剪贴板集成
set -g @plugin 'tmux-plugins/tmux-pain-control'   # 面板控制增强
set -g @plugin 'tmux-plugins/tmux-prefix-highlight' # 前缀键提示

# 主题插件（选一个）
set -g @plugin 'dracula/tmux'                     # Dracula 主题
# set -g @plugin 'catppuccin/tmux'                 # Catppuccin 主题
# set -g @plugin 'wfxr/tmux-power'                 # Powerline 风格

# Dracula 主题配置
set -g @dracula-show-powerline true
set -g @dracula-plugins "cpu-usage ram-usage time"
set -g @dracula-cpu-usage-label "CPU"
set -g @dracula-ram-usage-label "RAM"
set -g @dracula-time-format "%H:%M"

# 初始化 TPM（保持这行在配置最后）
run '~/.tmux/plugins/tpm/tpm'
