# ==================== 通用 ====================
set -g mouse on
# 开启终端真彩色支持
set -g default-terminal "tmux-256color"

# 确保 tmux 传递颜色设置
set -ga terminal-overrides ",*256col*:Tc"

# 注意:不要再手写 setw/-g window-status-style、pane-border-style、
# message-style、status-style 之类的 Dracula 时代硬编码 —— 它们会覆盖
# catppuccin 通过 @catppuccin_window_* / @catppuccin_pane_* 注入的配色,
# 导致主题色跟窗口/pane 边框脱节。所有视觉样式交给 catppuccin。

# ==================== 插件管理 ====================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'      # 基础优化

# 常用插件
set -g @plugin 'tmux-plugins/tmux-resurrect'     # 会话保存/恢复
set -g @plugin 'tmux-plugins/tmux-continuum'      # 自动保存
set -g @plugin 'tmux-plugins/tmux-yank'           # 系统剪贴板集成
set -g @plugin 'tmux-plugins/tmux-pain-control'   # 面板控制增强
set -g @plugin 'tmux-plugins/tmux-prefix-highlight' # 前缀键提示

# 主题
set -g @plugin 'catppuccin/tmux'                 # Catppuccin (mocha)

# ==================== Catppuccin 配置 ====================
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "slanted"

# 禁用未使用的内置模块(保留 directory + git + session + host)
set -g @catppuccin_status_application_disable  true
set -g @catppuccin_status_date_time_disable    true
set -g @catppuccin_status_uptime_disable       true

# ==================== Prefix Highlight 配色(对齐 catppuccin) ====================
# 颜色直接给 hex 字面量(prefix-highlight 不展开 #{E:@thm_*})。
# prompt 文本里塞 powerline 字符  让边缘圆角,跟 catppuccin 主题风格一致。

# 静态状态(空闲,显示当前 prefix 键):绿色徽章
set -g @prefix_highlight_empty_prompt "  ^A  "
set -g @prefix_highlight_empty_attr   "fg=#11111b,bg=#a6e3a1"   # crust on green
set -g @prefix_highlight_empty_has_affixes "on"

# prefix 模式(按下等待命令):mauve 徽章
set -g @prefix_highlight_prefix_prompt "  ^A  "
set -g @prefix_highlight_bg            "#cba6f7"   # mauve
set -g @prefix_highlight_fg            "#11111b"   # crust

# copy-mode:peach 徽章
set -g @prefix_highlight_copy_prompt   "  COPY  "
set -g @prefix_highlight_copy_mode_attr "fg=#11111b,bg=#fab387"  # crust on peach

# sync-mode:yellow 徽章
set -g @prefix_highlight_sync_prompt   "  SYNC  "
set -g @prefix_highlight_sync_mode_attr "fg=#11111b,bg=#f9e2af"  # crust on yellow

# 输出后(刚执行完命令):peach 短闪
set -g @prefix-highlight-output-prefix "  "
set -g @prefix-highlight-output-suffix "  "
set -g @prefix-highlight-output-bg    "#fab387"   # peach
set -g @prefix-highlight-output-fg    "#11111b"

# ==================== TPM 初始化 ====================
# 必须放在 status-right 之前 —— 状态栏里 #{E:@catppuccin_status_*}
# 依赖 catppuccin 加载后才会定义的变量,run tpm 会同步等插件加载完才返回。
run '~/.tmux/plugins/tpm/tpm'

# ==================== status-right ====================
set -g status-right "#{E:@catppuccin_status_directory}#{E:@catppuccin_status_git}#{E:@catppuccin_status_session}#{E:@catppuccin_status_host}"