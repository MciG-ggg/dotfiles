# ==================== 通用 ====================
set -g mouse on
# 开启终端真彩色支持
set -g default-terminal "tmux-256color"

# 确保 tmux 传递颜色设置
set -ga terminal-overrides ",*256col*:Tc"

# ==================== 配色基线(被 catppuccin 主题覆盖大部分) ====================
set -g status-style bg=black,fg=white
setw -g window-status-style fg=cyan,bg=black
setw -g window-status-current-style fg=white,bg=blue,bold
set -g pane-border-style fg=green
set -g pane-active-border-style fg=brightgreen
set -g message-style fg=white,bg=black,bright

# ==================== 插件管理 ====================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'      # 基础优化

# 常用插件
set -g @plugin 'tmux-plugins/tmux-resurrect'     # 会话保存/恢复
set -g @plugin 'tmux-plugins/tmux-continuum'      # 自动保存
set -g @plugin 'tmux-plugins/tmux-yank'           # 系统剪贴板集成
set -g @plugin 'tmux-plugins/tmux-pain-control'   # 面板控制增强
set -g @plugin 'tmux-plugins/tmux-prefix-highlight' # 前缀键提示

# 主题
set -g @plugin 'catppuccin/tmux'                 # Catppuccin (mocha)

# ==================== Catppuccin 配置 ====================
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# 禁用未使用的内置模块(只保留 directory + git)
set -g @catppuccin_status_application_disable  true
set -g @catppuccin_status_session_disable      true
set -g @catppuccin_status_host_disable         true
set -g @catppuccin_status_date_time_disable    true
set -g @catppuccin_status_uptime_disable       true

# ==================== TPM 初始化 ====================
# 必须放在自定义 status module 之前 —— 模块模板里的 #{E:@thm_*}
# 依赖 catppuccin 加载后才会定义的变量,run tpm 会同步等插件加载完才返回。
run '~/.tmux/plugins/tpm/tpm'

# ==================== 自定义 status module:local_ip ====================
# 手动按 catppuccin utils/status_module.conf 的结构展开,避免依赖 %hidden + $MODULE_NAME
# 配色策略:icon_bg = peach(暖色与 cwd 的 rosewater 区分),text_bg 默认 surface0(与 cwd 同底,衔接自然)

# 1. 左分隔符段(icon_bg 色块 + 左箭头字符)
set -gF "@catppuccin_status_local_ip" \
  "#[fg=#{@thm_peach}]#{@catppuccin_status_left_separator}"

# 2. icon 段(无图标,只放一个空格占位;前景 crust 配 peach 背景对比强)
set -agF "@catppuccin_status_local_ip" \
  "#[fg=#{@thm_crust},bg=#{@thm_peach}] "

# 3. 中分隔符
set -agF "@catppuccin_status_local_ip" \
  "#{@catppuccin_status_middle_separator}"

# 4. text 段前景背景,以及自定义文字内容
#    text_bg 默认与 cwd 一致(surface0),衔接无割裂
set -agF "@catppuccin_status_local_ip" \
  "#[fg=#{@thm_fg},bg=#{@catppuccin_status_module_text_bg}]LAN #(tmux-local-ip) "

# 5. 右分隔符段(收尾)
set -ag "@catppuccin_status_local_ip" \
  "#{@catppuccin_status_right_separator}"

# ==================== status-right ====================
set -g status-right "#{E:@catppuccin_status_directory}#{E:@catppuccin_status_git}#{E:@catppuccin_status_local_ip}"